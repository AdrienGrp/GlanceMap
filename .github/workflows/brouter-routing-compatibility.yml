name: BRouter Routing Compatibility

on:
  schedule:
    - cron: "23 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: brouter-routing-compatibility-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live-routing-pack-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check live BRouter routing pack format
        run: scripts/check-brouter-routing-compatibility.sh
