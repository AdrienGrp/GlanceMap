name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check BRouter routing metadata
        run: CHECK_LIVE_BROUTER=false scripts/check-brouter-routing-compatibility.sh

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Run style, static analysis, compile, unit tests, and lint
        run: |
          ./gradlew \
            ktlintCheck \
            detekt \
            :app:compileDebugKotlin \
            :glancemapcompanionapp:compileDebugKotlin \
            :app:testDebugUnitTest \
            :glancemapcompanionapp:testDebugUnitTest \
            :app:lintDebug \
            :glancemapcompanionapp:lintDebug
