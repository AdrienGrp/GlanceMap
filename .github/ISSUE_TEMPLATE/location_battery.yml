name: Location battery issue
description: Report excessive battery usage related to location tracking.
title: "[Location][Battery] "
labels:
  - location
  - battery
body:
  - type: markdown
    attributes:
      value: |
        Please provide context and measurement details so battery impact can be evaluated.
  - type: input
    id: watch_model
    attributes:
      label: Watch model
      placeholder: "Pixel Watch 2"
    validations:
      required: true
  - type: input
    id: wear_os_version
    attributes:
      label: Wear OS version
      placeholder: "Wear OS 5"
    validations:
      required: true
  - type: input
    id: session_duration
    attributes:
      label: Session duration
      placeholder: "1h 45m"
    validations:
      required: true
  - type: input
    id: battery_drop
    attributes:
      label: Battery drop
      placeholder: "37%"
    validations:
      required: true
  - type: dropdown
    id: source_mode
    attributes:
      label: Source mode
      options:
        - auto_fused
        - watch_gps
        - mixed
        - unknown
    validations:
      required: true
  - type: dropdown
    id: ambient_mode
    attributes:
      label: Ambient mode during session
      options:
        - mostly inactive
        - mixed
        - mostly active
    validations:
      required: true
  - type: input
    id: gps_interval
    attributes:
      label: gpsIntervalMs setting
      placeholder: "4000"
    validations:
      required: true
  - type: textarea
    id: expected_vs_actual
    attributes:
      label: Expected vs actual battery behavior
      placeholder: "Expected < 15%/h, observed ~25%/h."
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / telemetry
      description: Include any `EnergyTelemetry` and location service telemetry around the session.
      render: text
    validations:
      required: true
